<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="body">
    <header>
      <div id="headerdiv">
        <h2>snap</h2>
        <nav>
          <ol>
            <li>Features <img src="./images/icon-arrow-down.svg" alt=""></li>
            <li>Company <img src="./images/icon-arrow-down.svg" alt=""></li>
            <li>Careers</li>
            <li>About</li>
          </ol>
        </nav>
      </div>

      <div id="buttondiv">
        <button id="login" class="btn">Login</button>
        <button id="reg" class="btn">Register</button>
      </div>
    </header>

    <div class="maindiv">
      <div class="textdiv">
        <div class="content-wrapper">
          <h1 id="Remote">Make remote work</h1>
          <p id="team">Get your team in sync, no matter your location. Streamline processes, create team rituals, and watch productivity soar.</p>
          <button class="learn-more">Learn more</button>
        </div>
        
        <div class="imgdiv">
          <img src="./images/client-databiz.svg" alt="databiz">
          <img src="./images/client-audiophile.svg" alt="audiophile">
          <img src="./images/client-meet.svg" alt="meet">
          <img src="./images/client-maker.svg" alt="maker">
        </div>
      </div>

      <div class="hero-image-container">
        <img src="./images/image-hero-desktop.png" alt="Hero" id="mainimg">
      </div>
    </div>
  </div>
</body>
</html>
