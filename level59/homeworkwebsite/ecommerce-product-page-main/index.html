<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header1">
    <div class="div1">
      <img src="./images/logo.svg" alt="logo" class="img1">
      <nav>
        <ul class="ul1">
          <li><a href="">Collections</a></li>
          <li><a href="">Men</a></li>
          <li><a href="">Women</a></li>
          <li><a href="">About</a></li>
          <li><a href="">Contact</a></li>
        </ul>
      </nav>
    </div>
    <div class="div2">
      <button class="button1"><img src="./images/icon-cart.svg" alt="cart"></button>
      <img src="./images/image-avatar.png" alt="avatar" class="img2">
    </div>
  </header>

  <main class="main1">
    <section class="section1">
      <div class="div3">
        <img src="./images/image-product-1.jpg" alt="Sneakers" class="img3">
      </div>
      <div class="div4">
        <div class="div-img active"><img src="./images/image-product-1.jpg" alt="1" class="img4"></div>
        <div class="div-img"><img src="images/image-product-2-thumbnail.jpg" alt="2" class="img5"></div>
        <div class="div-img"><img src="images/image-product-3-thumbnail.jpg" alt="3" class="img6"></div>
        <div class="div-img"><img src="images/image-product-4-thumbnail.jpg" alt="4" class="img7"></div>
      </div>
    </section>

    <section class="section2">
      <p class="p1">SNEAKER COMPANY</p>
      <h1 class="h1">Fall Limited Edition Sneakers</h1>
      <p class="p2">These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole, they’ll withstand everything the weather can offer.</p>

      <div class="div5">
        <div class="div6">
          <div class="div7">$125.00</div>
          <div class="div8">50%</div>
        </div>
        <div class="div9">$250.00</div>
      </div>

      <div class="div10">
        <div class="div11">
          <button class="button2">-</button>
          <div class="div12">0</div>
          <button class="button3">+</button>
        </div>
        <button class="button4">
          <img src="./images/icon-cart.svg" alt="" class="img-cart">
          <p>Add to cart</p>
        </button>
      </div>
    </section>
  </main>
</body>
</html>
