<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="main1">
      <section class="section1">
        <div class="div1">
          <img src="./images/card-logo.svg" alt="logo" class="img1" />
          <div class="div2">
            <p class="p1">0000 0000 0000 0000</p>
            <div class="div3">
              <p class="p2">JANE APPLESEED</p>
              <p class="p3">00/00</p>
            </div>
          </div>
        </div>
        <div class="div4">
          <p class="p4">000</p>
        </div>
      </section>

      <section class="section2">
        <form class="form1">
          <div class="div5">
            <label>CARDHOLDER NAME</label>
            <input type="text" placeholder="e.g. Jane Appleseed" />
          </div>
          <div class="div6">
            <label>CARD NUMBER</label>
            <input type="text" placeholder="e.g. 1234 5678 9123 0000" />
          </div>
          <div class="div7">
            <div class="div8">
              <label>EXP. DATE (MM/YY)</label>
              <div class="div9">
                <input type="text" placeholder="MM" class="input3" />
                <input type="text" placeholder="YY" class="input4" />
              </div>
            </div>
            <div class="div10">
              <label>CVC</label>
              <input type="text" placeholder="e.g. 123" class="input5" />
            </div>
          </div>
          <button type="submit" class="button1">Confirm</button>
        </form>
      </section>
    </main>

    <!-- 0000 0000 0000 0000
  Jane Appleseed
  00/00

  000

  Cardholder Name
  e.g. Jane Appleseed

  Card Number
  e.g. 1234 5678 9123 0000

  Exp. Date (MM/YY)
  MM
  YY

  CVC
  e.g. 123

  Confirm

  <!-- Completed state start -->

    <!-- Thank you!
  We've added your card details
  Continue -->
  </body>
</html>
